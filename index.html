<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smille</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Gentium+Plus:ital,wght@0,400;0,700;1,400;1,700&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Noto+Serif+KR:wght@200..900&display=swap" rel="stylesheet">
</head>
<body>
    <header class="cabeçalho">
        <div class="cabeçalho_marca">
            <h1 class="cabeçalho_titulo">Smille</h1>
            <img src="./imagens/Logotipo-preto.png" alt="Logo Smille" class="cabeçalho_logo">
        </div>
        <div class="cabeçalho_seções">
            <p class="cabeçalho_seções_item">Loja</p>
            <p class="cabeçalho_seções_item">Sobre</p>
            <p class="cabeçalho_seções_item">Contato</p>
            <p class="cabeçalho_seções_item">Minha conta</p>
            <img src="./imagens/bag.png" alt="Carrinho de compras" class="cabeçalho_seções_carrinho">
        </div>
    </header>
    <main class="meio">
        <section class="meio_introdução">
            <img src="./imagens/Vela-introdução.jpg" alt="Imagem de introdução" class="meio_introdução_imagem">
            <div class="meio_introdução_texto">
                <span class="estrela esquerda-1">✦</span>
                <span class="estrela esquerda-2">✦</span>
                <h1 class="meio_introdução_titulo">RITUAIS DE CALMA E CONFORTO</h1>
                <span class="estrela direita-1">✦</span>
                <span class="estrela direita-2">✦</span>
            </div>
        </section>
    </main>
    <footer class="rodapé">
        <img src="./imagens/Logo-smille-preto.png" alt="Logo Smille" class="rodapé_logo">
            <div class="rodapé_termos">
                <a href="#" class="rodapé_termos_item">Termos de Serviço</a>
                <a href="#" class="rodapé_termos_item">Política de Privacidade</a>
            </div>
            <div class="rodapé_redes_sociais">
                <a href="https://www.instagram.com/smille.candles/?utm_source=ig_web_button_share_sheet" class="rodapé_redes_sociais_item">Instagram</a>
                <a href="#" class="rodapé_redes_sociais_item">Facebook</a>
                <a href="#" class="rodapé_redes_sociais_item">Pinterest</a>
            </div>
    </footer>
</body>
</html>
